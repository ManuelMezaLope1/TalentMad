<div class="container">
    <button (click)="registrarCarrera()" class="btn btn-primary">Agregar carrera</button>&nbsp;
    <button (click)="volverDashboard()" class="btn btn-primary">Dashboard</button>
    <br><br>
    <div *ngFor="let uni of universidades$ | async">
        <div class="alpha-header">
            <h2>{{uni.nombre}}</h2>
        </div>
        <br>
        <div class="carrera-grid">
            <div class="row">
                <div class="col-md-4 mb-4" *ngFor="let car of uni.carrera.sort((a,b) => a.nombre.localeCompare(b.nombre))">
                    <div class="card">
                        <div class="card-header bg-primary text-white">
                            <h5 class="card-title mb-0">{{ car.nombre }}</h5>
                            <small class="text-light">{{ car.tipoCarrera }}</small>
                        </div>
                        <div class="card-body">
                            <p class="card-text text-muted">{{ car.descripcion }}</p>
                            <p class="mb-1">
                                <i class="bi bi-clock"></i>
                                <strong>Duración:</strong> {{ car.duracion }} semestres
                            </p>
                        </div>
                        <div class="card-footer d-flex justify-content-center">
                            <button class="btn btn-sm btn-primary"
                                (click)="actualizarCarrera(car.id)">Actualizar</button>&nbsp;
                            <button class="btn btn-danger" (click)="eliminarCarrera(car.id)">Eliminar</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div *ngIf="!uni.carrera || uni.carrera.length === 0">
            <p class="text-center">No hay carreras en esta universidad</p>
        </div>
        <br><br>
    </div>
</div>
