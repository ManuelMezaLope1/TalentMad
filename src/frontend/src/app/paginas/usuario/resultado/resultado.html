<div class="min-h-screen bg-gradient-to-br from-purple-50 to-blue-50 py-8 px-4">
  <div class="w-full max-3xl mx-auto">
    
    <!-- Loading State -->
    <div *ngIf="isLoading" class="bg-white rounded-2xl p-12 shadow-lg text-center">
      <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-purple-600 border-t-transparent"></div>
      <p class="mt-4 text-gray-600">Cargando tus resultados...</p>
    </div>

    <!-- Resultados -->
    <div *ngIf="!isLoading && resultadoHtml" class="bg-white rounded-3xl p-8 shadow-xl">
      <div class="text-center mb-6">
        <div class="inline-block px-6 py-2 bg-gradient-to-r from-purple-600 to-blue-600 rounded-full">
          <span class="text-white font-bold text-xl">{{ codigoRIASEC }}</span>
        </div>
      </div>
      
      <div [innerHTML]="resultadoHtml" class="prose max-w-none"></div>
      
      <!-- Botones de acción -->
      <div class="mt-8 flex flex-col sm:flex-row gap-4 justify-center">
        <button (click)="volverATest()"
          class="px-6 py-3 bg-gradient-to-r from-purple-600 to-blue-600 text-white rounded-xl font-semibold hover:shadow-lg transition-all">
          ← Volver al Test
        </button>
        
        <button (click)="reiniciarTest()"
          class="px-6 py-3 border-2 border-purple-600 text-purple-600 rounded-xl font-semibold hover:bg-purple-50 transition-all">
          ↻ Reiniciar Test
        </button>
      </div>
    </div>

    <!-- Error -->
    <div *ngIf="!isLoading && !resultadoHtml" class="bg-white rounded-2xl p-12 shadow-lg text-center">
      <p class="text-gray-600">No se encontraron resultados. Por favor, completa el test primero.</p>
      <button (click)="volverATest()"
        class="mt-4 px-6 py-3 bg-gradient-to-r from-purple-600 to-blue-600 text-white rounded-xl font-semibold hover:shadow-lg transition-all">
        Ir al Test
      </button>
    </div>
  </div>
</div>
