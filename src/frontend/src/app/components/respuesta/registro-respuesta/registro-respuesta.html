<div class="col-md-6 offset-md-3">
    <h3 class="text-center">Registro de Respuestas</h3>

    <form (ngSubmit)="onSubmit()" #respuestaForm="ngForm">
        <div class="form-group">
            <label>Nombre: </label>
            <input type="text" class="form-control" id="nombre" [(ngModel)]="respuesta.nombre" name="nombre" required
                pattern="^[A-ZÁÉÍÓÚÑ][a-zA-ZáéíóúÁÉÍÓÚÑñ\s(),]+$" minlength="4" maxlength="70" placeholder="Digite el nombre" #nombre="ngModel" />
            <div class="alert alert-danger" *ngIf="nombre.invalid && (nombre.dirty || nombre.touched)">
                <div *ngIf="nombre.errors?.['required']">
                    Digite su nombre por favor
                </div>
                <div *ngIf="nombre.errors?.['minlength']">
                    El nombre tiene que contener como mínimo 4 caracteres
                </div>
                <div *ngIf="nombre.errors?.['maxlength']">
                    El nombre tiene que tener como máximo 70 caracteres
                </div>
                <div *ngIf="nombre.errors?.['pattern']">
                    El nombre debe tener sólamente letras.
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Pregunta: </label>
            <select name="respuestaPreguntas" id="respuestaPreguntas" class="form-control" [(ngModel)]="respuesta.respuestaPreguntas" required>
                <option [ngValue]="null">--Seleccione la pregunta--</option>
                <option *ngFor="let pre of preguntas" [ngValue]="pre">{{pre.preguntas}}</option>
            </select>
        </div>

        <button class="btn btn-success" [disabled]="!respuestaForm.form.valid">Guardar</button>
    </form>
</div>
