<nav class="navbar">
    <div class="logo">
        <span class="logo-icon">🎓</span>
        <span class="logo-text">TALENTMAD</span>
    </div>
    <div class="nav-links">
        <a (click)="scrollToSection('inicio')">Inicio</a>
        <a (click)="scrollToSection('beneficios')">Beneficios</a>
        <a (click)="scrollToSection('pasos')">Cómo funciona</a>
        <a (click)="scrollToSection('testimonios')">Testimonios</a>


        <div *ngIf="!authServicio.logueado()">
            <a routerLink="/login" class="btn-nav">✨ Comenzar test</a>
        </div>

        <div class="user-menu" *ngIf="authServicio.logueado()">
            <button class="btn-user" (click)="toggleUserMenu()">
                <span class="material-icons">account_circle</span>
                <span *ngIf="usuario">{{ usuario.nombre }}</span>
                <i class="material-icons" [class.rotated]="menuOpen">
                    arrow_drop_down
                </i>
            </button>

            <div class="drop-menu" [class.open]="menuOpen">
                <a routerLink="/perfil">
                    <i class="material-icons">badge</i>
                    <span>Mi perfil</span>
                </a>

                <div class="dropdown-divider"></div>

                <button (click)="logout()" class="dropdown-logout">
                    <i class="material-icons">logout</i>
                    Cerrar sesión
                </button>
            </div>
        </div>
    </div>


    <button class="mobile-menu-btn" [class.active]="mobileMenuOpen" (click)="toggleMobileMenu()">
        <i class="material-icons">format_align_justify</i>
    </button>
</nav>

<div class="mobile-menu" [class.open]="mobileMenuOpen">
    <a (click)="scrollToSection('inicio'); closeMobileMenu()">Inicio</a>
    <a (click)="scrollToSection('beneficios'); closeMobileMenu()">Beneficios</a>
    <a (click)="scrollToSection('pasos'); closeMobileMenu()">Cómo funciona</a>
    <a (click)="scrollToSection('testimonios'); closeMobileMenu()">Testimonios</a>

    <ng-container *ngIf="!authServicio.logueado()">
        <a routerLink="/login" class="mobile-btn-nav" (click)="closeMobileMenu()">
            ✨ Comenzar test
        </a>
    </ng-container>

    <div class="dropdown-divider"></div>

    <ng-container *ngIf="authServicio.logueado()">
        <a routerLink="/perfil" (click)="closeMobileMenu()">Mi perfil</a>
        <button (click)="logout()" class="mobile-btn-logout">
            Cerrar sesión
        </button>
    </ng-container>
</div>
