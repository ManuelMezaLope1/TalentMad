<div class="container">
    <div class="row">
        <h1>Listado de Respuestas</h1>
    </div>
    <button (click)="registrarRespuesta()" class="btn btn-primary">Agregar respuesta</button>&nbsp;
    <button (click)="volverDashboard()" class="btn btn-primary">Dashboard</button>
    <br><br>
    <table class="table text-center table-striped table-bordered table-hover">
        <thead>
            <tr>
                <th>Pregunta</th>
                <th>Nombre</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>
            <tr *ngFor="let pre of preguntas$ | async">
                <td class="align-middle text-center">{{pre.preguntas}}</td>
                <td>
                    <div *ngFor="let resp of pre.respuestas">
                        {{resp.nombre}}
                    </div>
                </td>
                <td></td>
            </tr>
        </tbody>
    </table>
</div>
